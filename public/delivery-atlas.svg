<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">North America delivery atlas</title>
  <desc id="desc">A dense visual atlas of Tony Wu's project delivery experience across aerospace controls, rail communications, major transit expansion, and digital assurance.</desc>
  <rect width="1400" height="980" fill="#101311"/>
  <path d="M70 100H1330M70 220H1330M70 340H1330M70 460H1330M70 580H1330M70 700H1330M70 820H1330" stroke="#2a302c" stroke-width="2"/>
  <path d="M190 60V900M370 60V900M550 60V900M730 60V900M910 60V900M1090 60V900M1270 60V900" stroke="#2a302c" stroke-width="2"/>

  <g font-family="IBM Plex Sans, Inter, Arial, sans-serif">
    <text x="70" y="70" fill="#36d29c" font-size="26" font-weight="900">15 YEAR DELIVERY ATLAS</text>
    <text x="70" y="102" fill="#b8afa2" font-size="18" font-weight="700">Controls -> rail communications -> program integration -> digital assurance</text>
    <text x="1190" y="70" text-anchor="end" fill="#f2aa45" font-size="18" font-weight="900">NORTH AMERICA</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
